version: '3.8'

services:
  # PHP Laravel Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ats-app
    restart: unless-stopped
    working_dir: /var/www
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - FRONTEND_URL=http://localhost:3000
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=ats_db
      - DB_USERNAME=ats_user
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - .:/var/www
      - ./storage/logs:/var/www/storage/logs
    networks:
      - ats-network
    depends_on:
      - mysql
      - redis
    command: php -d variables_order=EGPCS artisan serve --host=0.0.0.0 --port=8000

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: ats-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ats_db
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_PASSWORD: secret
      MYSQL_USER: ats_user
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ats-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ats-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ats-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 10s
      retries: 10

  # Nginx (Optional - for production-like local setup)
  # Uncomment to use Nginx instead of PHP artisan serve
  # nginx:
  #   image: nginx:alpine
  #   container_name: ats-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - .:/var/www
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf
  #   networks:
  #     - ats-network
  #   depends_on:
  #     - app

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  ats-network:
    driver: bridge
